<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>document</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content:center;
            align-items: center;
            background: rgb(0, 0, 0);
            background-image: url(Stary.jpg);
            background-repeat: no-repeat;
            background-size:cover;
            font-family: Arial, sans-serif;
            height: 100vh;
        }

        .panelL {
            width: 40vw;
            background: rgba(0, 0, 0, 0);
            overflow-y: auto;
        }

        .panelR {
            width: 60vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .grid-box {
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border: 5px solid rgb(255, 255, 255);
            border-radius: 40px;

            width: fit-content;   
            height: fit-content; 

            display: flex;
            justify-content: center;
            align-items: center;

        }

        .bingogrid {
            width: fit-content;   
            height: fit-content; 
            display: grid;
            grid-template-columns: repeat(5, 5rem);
            grid-template-rows: repeat(5, 5rem);
            gap: 10px;
        }

        .cell {

            aspect-ratio: 1 / 1;                  
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgb(255, 255, 255,);
            
            border-radius: 10px;
            border:5px, solid, rgb(20, 20, 20);
            
            font-size: 1.2rem;
            font-family: Cambria;
            font-size: large;
            text-align: center;
            color: rgb(255, 255, 255);

        }

        .cell input[type="checkbox"] {
            display:none;                         
        }

        .cell label {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .cell input:checked + label {
            background: rgb(32, 145, 32);
            color: rgb(255, 255, 255);
            border-radius: 10px;
            border-color: rgb(255, 255, 255);
            border-width: 5px;
        }

        .cell:hover {
            transform: scale(1.1);
            cursor: pointer;
            
        }


         h1{
            font-size: 6vw;
            color: rgb(255, 255, 255);
        }

        p{
            font-size: 2vw;
            color: rgb(255, 255, 255);
         }

    </style>
</head>
<body>
